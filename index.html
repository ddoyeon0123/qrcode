<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>앱 연결 | 서울이동통신</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Toss 스타일의 부드러운 애니메이션 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-dot { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="bg-[#f9fafb] flex items-center justify-center min-h-screen">

    <div class="text-center p-8 bg-white rounded-3xl shadow-sm max-w-sm w-full mx-4">
        <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-100">
            <span class="text-white font-bold text-2xl">015</span>
        </div>
        
        <h1 class="text-[#222] text-xl font-bold mb-2">앱으로 연결하고 있습니다</h1>
        <p class="text-[#6b7280] text-sm mb-8">잠시만 기다려주세요.<br>앱이 없다면 설치 페이지로 이동합니다.</p>

        <div class="flex justify-center gap-2">
            <div class="w-2 h-2 bg-blue-600 rounded-full loading-dot"></div>
            <div class="w-2 h-2 bg-blue-600 rounded-full loading-dot" style="animation-delay: 0.2s"></div>
            <div class="w-2 h-2 bg-blue-600 rounded-full loading-dot" style="animation-delay: 0.4s"></div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const userAgent = navigator.userAgent.toLowerCase();
            const isAndroid = /android/.test(userAgent);
            const isIOS = /iphone|ipad|ipod/.test(userAgent);

            // 여기에 실제 도연님의 앱 정보를 넣으세요
            const appConfig = {
                iosScheme: "myapp://", // 앱 커스텀 스킴
                iosStore: "https://a015.com/iapp", // 앱스토어 주소
                androidIntent: "https://play.google.com/store/apps/details?id=com.app015.talk" // 안드로이드 인텐트
            };

            if (isAndroid) {
                // 안드로이드: Intent 방식을 쓰면 앱이 있으면 열고, 없으면 플레이스토어로 자동 이동함
                location.href = appConfig.androidIntent;
            } 
            else if (isIOS) {
                // iOS: 앱 실행 시도 후, 반응 없으면 1.5초 뒤 스토어로 이동
                let visitedAt = new Date().getTime();
                
                setTimeout(() => {
                    // 1.5초 뒤에 현재 시간이 2초 이상 지나지 않았다면 (앱이 안 열려서 브라우저에 머물러 있다면)
                    if (new Date().getTime() - visitedAt < 2000) {
                        location.href = appConfig.iosStore;
                    }
                }, 1500);

                location.href = appConfig.iosScheme;
            } 
            else {
                // PC 등 기타 환경일 때 안내
                alert("모바일 기기에서 접속해주세요.");
            }
        };
    </script>
</body>
</html>
